<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Japón 2026">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Japón 2026</title>
<style>
:root {
  --bg:#0f172a; --card:#111827; --card2:#1f2937; --text:#f8fafc; --muted:#cbd5e1;
  --accent:#ef4444; --accent2:#f97316; --line:rgba(255,255,255,.12);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:linear-gradient(160deg,#020617,#1f2937);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.app{height:100dvh;display:flex;flex-direction:column}
.topbar{height:58px;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;padding-top:max(10px,env(safe-area-inset-top));background:rgba(2,6,23,.82);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);z-index:5}
.navbtn{border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);border-radius:999px;padding:9px 12px;font-weight:700;text-decoration:none;font-size:14px}
.navright{display:flex;gap:8px}
.titleMini{font-weight:800;font-size:15px;max-width:42vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
.screen{flex:1;min-height:0;position:relative}
.page{display:none;height:100%;padding:14px;overflow:hidden}
.page.active{display:block}
.scrollbox{height:100%;overflow:auto;padding-bottom:28px;-webkit-overflow-scrolling:touch}
.hero{border-radius:28px;padding:22px;background:radial-gradient(circle at top right,#ef4444 0,#f97316 24%,#111827 62%);box-shadow:0 20px 50px rgba(0,0,0,.35);margin-bottom:14px}
.hero h1{margin:0;font-size:34px;line-height:1.02}
.hero p{margin:8px 0 0;color:#fff;font-weight:600}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.daytile{border:1px solid var(--line);background:rgba(255,255,255,.08);border-radius:18px;padding:13px;text-decoration:none;color:var(--text);min-height:82px;display:flex;flex-direction:column;justify-content:space-between}
.daytile .date{font-weight:900}
.daytile .city{color:var(--muted);font-size:13px}
.card{background:rgba(17,24,39,.86);border:1px solid var(--line);border-radius:22px;padding:15px;margin-bottom:12px;box-shadow:0 12px 28px rgba(0,0,0,.22)}
.dayhead{background:linear-gradient(135deg,#ef4444,#f97316);border:none}
.kicker{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:#fee2e2;font-weight:900}
h2{margin:4px 0 0;font-size:30px}
h3{margin:0 0 10px;font-size:17px}
p,li{color:var(--muted);line-height:1.38}
ul{padding-left:20px;margin:6px 0}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
.action{display:block;text-align:center;background:rgba(255,255,255,.1);border:1px solid var(--line);border-radius:16px;padding:11px 8px;color:var(--text);text-decoration:none;font-weight:800;font-size:14px}
.primary{background:#fff;color:#111827}
.restaurant{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--line)}
.restaurant:first-of-type{border-top:none}
.price{min-width:46px;font-weight:900;color:#fed7aa}
.restname{font-weight:900;color:#fff}
.small{font-size:13px;color:var(--muted)}
.empty{color:#94a3b8;font-style:italic}
@media (max-width:380px){.actions{grid-template-columns:1fr} h2{font-size:25px} .topbar{height:54px} .navbtn{font-size:13px;padding:8px 10px}}
</style>
</head>

    <div class="navright">

    </div>

  <main class="screen">

        </div>
        <div id="indexGrid" class="grid"></div>
      </div>
    </section>
    <section id="day" class="page">
      <div id="dayContent" class="scrollbox"></div>
    </section>
  </main>
</div>

let current = 0;

function enc(s) { return encodeURIComponent(s || "Japan"); }
function mapsSearch(q) { return "https://www.google.com/maps/search/?api=1&query=" + enc(q); }
function mapsDir(q) { return "https://www.google.com/maps/dir/?api=1&destination=" + enc(q) + "&travelmode=transit"; }
function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
}

function buildIndex() {
  const grid = document.getElementById("indexGrid");
  grid.innerHTML = DAYS.map((d,i)=>`
    <a class="daytile" href="#" onclick="showDay(${i});return false;">
      <span class="date">Día ${d.n} · ${escapeHtml(d.date)}</span>
      <span class="city">📍 ${escapeHtml(d.city || d.zone)}</span>
    </a>`).join("");
}

function dayHtml(d) {
  const visits = d.visits && d.visits.length ? d.visits.map(v=>`<li>${escapeHtml(v)}</li>`).join("") : `<p class="empty">Sin visitas detalladas en el Excel.</p>`;
  const rests = (d.restaurants || []).map(r=>`
    <div class="restaurant">
      <div class="price">${escapeHtml(r[0])}</div>
      <div>
        <div class="restname">${escapeHtml(r[1])}</div>
        <div class="small">${escapeHtml(r[2])}</div>
        <div style="margin-top:7px"><a class="action" href="${mapsSearch(r[1] + " " + (d.city || d.zone))}" target="_blank">Abrir restaurante</a></div>
      </div>
    </div>`).join("");
  return `
    <div class="card dayhead">
      <div class="kicker">Día ${d.n} · ${escapeHtml(d.date)}</div>
      <h2>${escapeHtml(d.city || "Japón")}</h2>
      <div class="actions">
        <a class="action primary" href="${mapsSearch(d.zone)}" target="_blank">📍 Zona del día</a>
        <a class="action primary" href="${mapsDir(d.zone)}" target="_blank">🚆 Llévame allí</a>
        <a class="action" href="${mapsSearch("restaurantes cerca de mí")}" target="_blank">🍜 Cerca de mí</a>
        <a class="action" href="${mapsSearch("baños cerca de mí")}" target="_blank">🚻 Baños cerca</a>
      </div>
    </div>
    <div class="card">
      <h3>🏨 Hotel</h3>
      <p>${escapeHtml(d.hotel || "No indicado")}</p>
      ${d.hotel ? `<a class="action" href="${mapsSearch(d.hotel + " " + (d.city || "Japan"))}" target="_blank">Abrir hotel en Maps</a>` : ""}
    </div>
    <div class="card">
      <h3>🗺️ Qué ver</h3>
      <ul>${visits}</ul>
    </div>
    <div class="card">
      <h3>🍽️ Comida / cena prevista</h3>
      <p><b>Comida:</b> ${escapeHtml(d.food || "Libre / elegir sobre la marcha")}</p>
      <p><b>Cena:</b> ${escapeHtml(d.dinner || "Libre / elegir sobre la marcha")}</p>
    </div>
    <div class="card">
      <h3>🍣 Restaurantes seleccionados</h3>
      ${rests}
    </div>
    <div class="card">
      <h3>🚆 Transporte</h3>
      <p>${escapeHtml(d.transport || "Revisar trayecto del día en Maps / Google Maps.")}</p>
    </div>
  `;
}

function showIndex() {
  document.getElementById("index").classList.add("active");
  document.getElementById("day").classList.remove("active");
  document.getElementById("topTitle").textContent = "Índice";
}

function showDay(i) {
  current = Math.max(0, Math.min(DAYS.length-1, i));
  const d = DAYS[current];
  document.getElementById("dayContent").innerHTML = dayHtml(d);
  document.getElementById("index").classList.remove("active");
  document.getElementById("day").classList.add("active");
  document.getElementById("topTitle").textContent = `Día ${d.n} · ${d.city || "Japón"}`;
  document.getElementById("dayContent").scrollTop = 0;
  history.replaceState(null, "", "#dia-" + d.n);
}
function nextDay() { showDay(current + 1); }
function prevDay() { showDay(current - 1); }

function initialPage() {
  buildIndex();
  const hash = location.hash.match(/dia-(\d+)/);
  if (hash) return showDay(Number(hash[1])-1);

  const today = new Date();
  const local = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");
  const idx = DAYS.findIndex(d => d.dateIso === local);
  if (idx >= 0) showDay(idx);
  else showIndex();
}
initialPage();
</script>
