let current=0;
function enc(s){return encodeURIComponent(s||"Japan")}
function mapsSearch(q){return "https://www.google.com/maps/search/?api=1&query="+enc(q)}
function mapsDir(q){return "https://www.google.com/maps/dir/?api=1&destination="+enc(q)+"&travelmode=transit"}
function e(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function buildIndex(){
 document.getElementById("indexGrid").innerHTML=DAYS.map((d,i)=>`<a class="daytile" href="#" onclick="showDay(${i});return false;"><span class="date">Día ${d.n} · ${e(d.date)}</span><span class="city">📍 ${e(d.zoneLabel)}</span></a>`).join("");
}
function restHtml(d){
 return (d.restaurants||[]).map(r=>`<div class="restaurant">
 <div class="price">${e(r[0])} · ${e(r[1])} por persona aprox.</div>
 <div class="restname">${e(r[2])}</div>
 <div class="small">${e(r[3])}</div>
 <div class="small">📍 ${e(r[4])}</div>
 <div class="small">☎️ ${e(r[5])}</div>
 <div style="margin-top:8px"><a class="action" href="${mapsSearch(r[2]+" "+r[4])}" target="_blank">Abrir restaurante</a></div>
 </div>`).join("");
}
function dayHtml(d){
 const v=(d.visits&&d.visits.length)?d.visits.map(x=>`<li>${e(x)}</li>`).join(""):`<p class="empty">Sin visitas detalladas en el Excel.</p>`;
 const t=(d.transport&&d.transport.length)?d.transport.map(x=>`<li>${e(x)}</li>`).join(""):`<p class="empty">Sin transporte detallado.</p>`;
 const hotelQuery=(d.hotel.name||d.hotelRaw)+" "+(d.hotel.address||d.aloj||"Japan");
 return `<div class="card dayhead"><div class="kicker">Día ${d.n} · ${e(d.date)}</div><h2>${e(d.zoneLabel)}</h2>
 <div class="actions">
 <a class="action primary" href="${mapsSearch(d.zoneQuery)}" target="_blank">📍 Zona del día</a>
 <a class="action primary" href="${mapsDir(d.zoneQuery)}" target="_blank">🚆 Llévame allí</a>
 <a class="action" href="${mapsSearch("best restaurants near "+d.zoneQuery)}" target="_blank">🍣 Comer aquí</a>
 <a class="action" href="${mapsSearch("things to do or cafes near "+d.zoneQuery)}" target="_blank">☔ Plan B</a>
 <a class="action" href="${mapsSearch("electronics stores near "+d.zoneQuery)}" target="_blank">💻 Tecnología</a>
 <a class="action" href="${mapsSearch("fashion stores near "+d.zoneQuery)}" target="_blank">👕 Ropa</a>
 <a class="action" href="${mapsSearch("public toilets near "+d.zoneQuery)}" target="_blank">🚻 Baños zona</a>
 </div></div>
 <div class="card"><h3>🏨 Hotel</h3><p><b>${e(d.hotel.name||d.hotelRaw)}</b></p><p>📍 ${e(d.hotel.address||"Confirmar en la reserva")}</p><p>☎️ ${e(d.hotel.phone||"Confirmar")}</p>${d.hotel.note?`<p class="warn">${e(d.hotel.note)}</p>`:""}
 <div class="hotelgrid"><a class="action primary" href="${mapsSearch(hotelQuery)}" target="_blank">Abrir hotel en Maps</a><a class="action primary" href="${mapsDir(hotelQuery)}" target="_blank">Ir al hotel</a></div></div>
 <div class="card"><h3>🗺️ Qué ver</h3><ul>${v}</ul></div>
 <div class="card"><h3>🍽️ Comida / cena prevista</h3><p><b>Comida:</b> ${e(d.comer||"Libre / elegir con Comer aquí")}</p><p><b>Cena:</b> ${e(d.cenar||"Libre / elegir con restaurantes seleccionados")}</p></div>
 <div class="card"><h3>🍣 Restaurantes seleccionados</h3>${restHtml(d)}</div>
 <div class="card"><h3>🚆 Transporte recomendado</h3><ul>${t}</ul></div>`;
}
function showIndex(){document.getElementById("index").classList.add("active");document.getElementById("day").classList.remove("active");document.getElementById("topTitle").textContent="Índice";}
function showDay(i){current=Math.max(0,Math.min(DAYS.length-1,i));const d=DAYS[current];document.getElementById("dayContent").innerHTML=dayHtml(d);document.getElementById("index").classList.remove("active");document.getElementById("day").classList.add("active");document.getElementById("topTitle").textContent=`Día ${d.n} · ${d.zoneLabel}`;document.getElementById("dayContent").scrollTop=0;}
function nextDay(){showDay(current+1)} function prevDay(){showDay(current-1)}
function initialPage(){
 buildIndex();
 const today=new Date(); const local=today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
 const first=DAYS[0].dateIso, last=DAYS[DAYS.length-1].dateIso;
 let idx=DAYS.findIndex(d=>d.dateIso===local);
 if(idx>=0) showDay(idx); else showIndex();
}
initialPage();
</script></body></html>
